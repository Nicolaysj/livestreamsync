name: Bug report
description: Something in LivestreamSync didn't work as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in what you can.
  - type: input
    id: version
    attributes:
      label: LivestreamSync version
      placeholder: e.g. 0.1.0
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Anchor VOD: ...
        2. Start / Stop: ...
        3. Streamers: ...
        4. ...
  - type: textarea
    id: skip-reason
    attributes:
      label: Per-streamer status / skip reason (if relevant)
      description: If a streamer was skipped, paste the reason LivestreamSync showed.
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, logs, or other context.
