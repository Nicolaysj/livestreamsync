name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # The renderer/engine typecheck doesn't need the Electron binary.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Typecheck
        run: npm run typecheck

      # Build both bundles so a renderer or esbuild break surfaces here, not
      # on the next release tag (typecheck alone doesn't catch bundler issues).
      - name: Build renderer
        run: npm run build:web

      - name: Build main process
        run: npm run build:main
