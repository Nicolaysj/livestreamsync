name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # The renderer/engine typecheck doesn't need the Electron binary.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Typecheck
        run: npm run typecheck
