name: Release

# Cut a release by pushing a version tag:
#   git tag v0.2.0 && git push origin v0.2.0
# Each OS builds its installer and uploads it as a workflow artifact; a single `publish`
# job then creates ONE GitHub Release with all assets. Publishing only happens if BOTH
# builds succeed (atomic — no half-releases, no two jobs racing to create the release).
# Both builds are unsigned — see the README for the first-launch (SmartScreen/Gatekeeper) steps.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Tagging without bumping package.json would ship a release whose latest.yml
  # still carries the old version — every installed copy's auto-updater would
  # then report "up to date" forever. Refuse to build such a tag.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG. Bump the version, retag, and push again."
            exit 1
          fi
      # Release notes are user-facing and hand-written — a release without a
      # changelog section would fall back to raw commit lists, so refuse it.
      - name: Verify CHANGELOG.md has notes for this version
        run: |
          V="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## \[$V\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$V]' section. Write user-facing notes (rename Unreleased), commit, retag."
            exit 1
          fi

  build-windows:
    needs: guard
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          # electron-builder downloads its own Electron; skipping the npm-postinstall
          # download avoids a flaky ~150 MB fetch during install.
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - name: Build Windows installer
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/LivestreamSync-Setup.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 1

  build-mac:
    needs: guard
    # macos-14 is an Apple Silicon (arm64) runner — builds the arm64 app natively.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - name: Build macOS app (unsigned, arm64)
        run: npm run package:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            release/*.dmg
            release/*-arm64.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      # User-facing notes from CHANGELOG.md, not auto-generated commit lists:
      # take everything from this version's heading to the next "## [" heading.
      - name: Extract release notes from CHANGELOG.md
        run: |
          V="${GITHUB_REF_NAME#v}"
          awk -v ver="$V" '
            /^## \[/ { if (found) exit; if (index($0, "## [" ver "]") == 1) { found = 1; next } }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::Extracted empty release notes for $V from CHANGELOG.md."
            exit 1
          fi
          echo "--- release notes ---"; cat release-notes.md
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**/*
          body_path: release-notes.md
          generate_release_notes: false
          # A glob that matches nothing must fail the publish, not silently
          # create an empty release ("atomic publish" promise above).
          fail_on_unmatched_files: true
