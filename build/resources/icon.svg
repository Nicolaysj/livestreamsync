<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="940" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0C079"/>
      <stop offset="0.48" stop-color="#E09036"/>
      <stop offset="1" stop-color="#9E5300"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.04" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#3a1e05" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>
  <!-- One offset back card hints at "multiple angles"; the front card stays crisp. -->
  <g filter="url(#shadow)">
    <rect x="392" y="296" width="404" height="300" rx="58" fill="#ffffff" opacity="0.55"/>
  </g>
  <!-- amber gap so the two cards stay separate even at 16px, then the solid front card -->
  <rect x="284" y="356" width="436" height="332" rx="74" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="300" y="372" width="404" height="300" rx="58" fill="#ffffff"/>
    <path d="M455 446 L611 522 L455 598 Z" fill="#9E5300"/>
  </g>
</svg>